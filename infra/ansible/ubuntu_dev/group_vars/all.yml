ubuntu_dev_user: >-
  {{
    lookup('ansible.builtin.env', 'SUDO_USER') | default('', true)
    or lookup('ansible.builtin.env', 'USER') | default('', true)
    or 'root'
  }}
ubuntu_dev_change_default_shell: true

ubuntu_dev_starship_version: "1.24.2"
ubuntu_dev_neovim_version: "0.12.1"
ubuntu_dev_apt_lock_timeout: 600
ubuntu_dev_apt_wait_poll_interval: 5
ubuntu_dev_apt_update_cache_retries: 10
ubuntu_dev_apt_update_cache_retry_max_delay: 12
ubuntu_dev_wait_for_package_manager: true

ubuntu_dev_neovim_bootstrap_plugins: true
ubuntu_dev_neovim_mason_packages:
  - lua-language-server
  - stylua
  - prettier
  - roslyn
