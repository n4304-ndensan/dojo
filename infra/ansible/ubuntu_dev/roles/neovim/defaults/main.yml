ubuntu_dev_neovim_supported_architectures:
  - x86_64

ubuntu_dev_neovim_arch_map:
  x86_64: x86_64

ubuntu_dev_architecture: "{{ ansible_facts.architecture | default(ansible_architecture | default('x86_64')) }}"
ubuntu_dev_neovim_deb_arch: "{{ ubuntu_dev_neovim_arch_map[ubuntu_dev_architecture] | default('x86_64') }}"
ubuntu_dev_neovim_deb_url: "https://github.com/neovim/neovim-releases/releases/download/v{{ ubuntu_dev_neovim_version }}/nvim-linux-{{ ubuntu_dev_neovim_deb_arch }}.deb"
ubuntu_dev_neovim_deb_path: "{{ ubuntu_dev_download_dir }}/nvim-linux-{{ ubuntu_dev_neovim_deb_arch }}-v{{ ubuntu_dev_neovim_version }}.deb"

ubuntu_dev_uv_installer_url: https://astral.sh/uv/install.sh
ubuntu_dev_rustup_installer_url: https://sh.rustup.rs
ubuntu_dev_dotnet_sdk_package: dotnet-sdk-10.0
ubuntu_dev_dotnet_backports_repository: ppa:dotnet/backports
ubuntu_dev_distribution: "{{ ansible_facts.distribution | default(ansible_distribution | default('')) }}"
ubuntu_dev_distribution_version: "{{ ansible_facts.distribution_version | default(ansible_distribution_version | default('')) }}"
ubuntu_dev_dotnet_enable_backports_repository: "{{ ubuntu_dev_distribution == 'Ubuntu' and ubuntu_dev_distribution_version == '24.04' and ubuntu_dev_dotnet_sdk_package == 'dotnet-sdk-9.0' }}"

ubuntu_dev_neovim_config_dir: "{{ ubuntu_dev_config_home }}/nvim"
ubuntu_dev_neovim_env:
  HOME: "{{ ubuntu_dev_home }}"
  PATH: "{{ ubuntu_dev_local_bin }}:{{ ubuntu_dev_home }}/.cargo/bin:{{ ubuntu_dev_home }}/.dotnet/tools:{{ ansible_env.PATH }}"
